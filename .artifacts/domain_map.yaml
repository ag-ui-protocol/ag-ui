        priority: HIGH
        status: active

      - mistake: 'Wrong middleware execution order assumption'
        mechanism: 'Middleware wraps from outside in. agent.use(a, b, c) means a runs first (outermost), then b, then c, then agent.run(). Events flow back through c, b, a.'
        source: 'sdks/typescript/packages/client/src/agent/agent.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Blocking operations in middleware'
        mechanism: 'Middleware runs in the RxJS pipeline. Synchronous blocking operations (long loops, sync I/O) block the entire event stream. Use async operations with RxJS operators.'
        source: 'docs/concepts/middleware.mdx'
        priority: MEDIUM
        status: active
    compositions:
