  - name: 'State Synchronization'
    slug: 'state-synchronization'
    domain: 'state-and-messages'
    description: 'Synchronize state between agent and UI using STATE_SNAPSHOT for complete representations and STATE_DELTA with JSON Patch (RFC 6902) for incremental updates'
    type: core
    packages:
      - '@ag-ui/core'
      - '@ag-ui/client'
    covers:
      - 'STATE_SNAPSHOT event'
      - 'STATE_DELTA event'
      - 'JSON Patch operations (RFC 6902)'
      - 'JSON Pointer paths (RFC 6901)'
      - 'MESSAGES_SNAPSHOT event'
      - 'Message accumulation across runs'
      - 'Bidirectional state updates'
      - 'State as flexible metadata channel (implicit knowledge: state snapshot can carry config options, internal system IDs, and metadata to the client)'
    tasks:
      - 'Emit state snapshots from agent'
      - 'Apply JSON Patch deltas to state'
      - 'Handle MESSAGES_SNAPSHOT for conversation history'
      - 'Implement state reset between runs'
    failure_modes:
      - mistake: 'Merging STATE_SNAPSHOT instead of replacing'
        mechanism: 'When a STATE_SNAPSHOT event arrives, the frontend must replace its entire state model, not merge it with previous state. Merging causes stale fields to persist.'
        wrong_pattern: |
          case EventType.STATE_SNAPSHOT:
            state = { ...state, ...event.snapshot };  // Wrong: merge
        correct_pattern: |
          case EventType.STATE_SNAPSHOT:
            state = event.snapshot;  // Correct: replace
        source: 'docs/concepts/state.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Applying STATE_DELTA to wrong base state'
        mechanism: 'JSON Patch operations are position-dependent. Applying deltas out of order or to the wrong base state produces corrupted state. Always apply in sequence after the latest snapshot.'
        source: 'docs/concepts/state.mdx'
        priority: HIGH
        status: active

      - mistake: 'Invalid JSON Pointer path in delta'
        mechanism: 'Patch operations use RFC 6901 JSON Pointer paths (e.g. /user/preferences). Using dot notation or array indices without leading slash fails silently or throws.'
        wrong_pattern: |
          { op: "replace", path: "user.preferences.theme", value: "dark" }
        correct_pattern: |
          { op: "replace", path: "/user/preferences/theme", value: "dark" }
        source: 'docs/concepts/state.mdx'
        priority: HIGH
        status: active

      - mistake: 'Assuming messages reset each run'
        mechanism: 'Messages accumulate across sequential runs in the same thread. Only a MESSAGES_SNAPSHOT resets them. New run messages are appended to existing history.'
        source: 'docs/concepts/events.mdx'
        priority: HIGH
        status: active
        skills: ['state-synchronization', 'run-lifecycle']
    compositions:
      - library: 'fast-json-patch'
        skill: null

