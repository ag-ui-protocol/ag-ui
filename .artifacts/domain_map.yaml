        mechanism: 'The defaultApplyEvents implementation preserves activity messages during MESSAGES_SNAPSHOT merges. Custom implementations must also handle this or activity UI disappears.'
        source: 'sdks/typescript/packages/client/src/apply/default.ts'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Run Lifecycle'
    slug: 'run-lifecycle'
    domain: 'event-streaming'
    description: 'Manage the run lifecycle with RUN_STARTED/FINISHED/ERROR events, step tracking, multiple sequential runs, and error handling'
    type: core
    packages:
      - '@ag-ui/core'
      - '@ag-ui/client'
    covers:
      - 'RUN_STARTED event'
      - 'RUN_FINISHED event'
      - 'RUN_ERROR event'
      - 'STEP_STARTED/STEP_FINISHED events'
      - 'Multiple sequential runs'
      - 'parentRunId for lineage'
      - 'Error handling patterns'
    tasks:
      - 'Emit proper run lifecycle events'
      - 'Track steps within a run'
      - 'Handle multiple sequential runs in one stream'
      - 'Implement error recovery'
    failure_modes:
      - mistake: 'Events after RUN_ERROR'
        mechanism: 'No events are allowed after RUN_ERROR. The verifier throws "The run has already errored with RUN_ERROR. No further events can be sent."'
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: CRITICAL
        status: active

      - mistake: 'Non-RUN_STARTED events after RUN_FINISHED'
        mechanism: 'After RUN_FINISHED, only RUN_STARTED (for a new sequential run) is allowed. Any other event throws "The run has already finished. Start a new run with RUN_STARTED."'
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: HIGH
        status: active

      - mistake: 'Unbalanced STEP_STARTED/STEP_FINISHED'
        mechanism: 'Step events must be paired. STEP_FINISHED with a stepName that was not started, or RUN_FINISHED with active steps, causes verification errors.'
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Starting new run without finishing current one'
        mechanism: 'RUN_STARTED while a run is already active throws "Cannot send RUN_STARTED while a run is still active". Each run must complete before the next starts.'
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: HIGH
        status: active
    compositions: []

  - name: 'Custom and Raw Events'
    slug: 'custom-and-raw-events'
    domain: 'event-streaming'
    description: 'Handle RAW events from external systems and CUSTOM application-defined events for extensibility'
    type: core
    packages:
      - '@ag-ui/core'
    covers:
      - 'RAW event type'
      - 'CUSTOM event type'
      - 'Custom event name and value'
      - 'Raw event source attribution'
    tasks:
      - 'Emit custom events for application-specific needs'
      - 'Pass through raw events from external systems'
      - 'Handle custom events in subscribers'
    failure_modes:
      - mistake: 'Using CUSTOM events for standard protocol features'
        mechanism: 'Custom events should only be used for truly application-specific needs. Using them instead of standard event types (text messages, tool calls, state) breaks interoperability with other AG-UI consumers.'
        source: 'docs/concepts/events.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Assuming RAW event structure'
        mechanism: 'RAW events wrap external system events with no guaranteed structure. Consumers must handle arbitrary shapes and should check the source field for attribution.'
        source: 'docs/concepts/events.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Missing name field on CUSTOM event'
        mechanism: 'CustomEvent requires both name (string) and value (any). Omitting the name makes the event unroutable by consumers.'
        source: 'sdks/typescript/packages/core/src/events.ts'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Serialization'
    slug: 'serialization'
    domain: 'state-and-messages'
    description: 'Persist event streams, compact verbose histories, and support branching/time-travel via run lineage'
    type: core
    packages:
      - '@ag-ui/core'
      - '@ag-ui/client'
    covers:
      - 'Stream serialization to JSON'
      - 'Event compaction rules'
      - 'parentRunId for run lineage'
      - 'Branching from any prior run'
      - 'Input normalization'
      - 'Compaction API'
    tasks:
      - 'Serialize an event stream for persistence'
      - 'Compact verbose event history to snapshots'
      - 'Implement branching with parentRunId'
      - 'Restore a conversation from serialized events'
    failure_modes:
      - mistake: 'Compacting before run completion'
        mechanism: 'Compaction merges TEXT_MESSAGE_* sequences into snapshots and collapses STATE_DELTA chains. Running it on incomplete runs loses in-progress message fragments.'
        source: 'docs/concepts/serialization.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Losing activity messages during compaction'
        mechanism: 'Activity messages must be preserved during compaction as they represent frontend UI state. Custom compaction logic must handle them separately.'
        source: 'sdks/typescript/packages/client/src/apply/default.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Not normalizing input on branched runs'
        mechanism: 'When branching with parentRunId, the new run input may include messages already in history. Normalization removes duplicates. Without it, messages appear twice.'
        source: 'docs/concepts/serialization.mdx'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Event Encoding'
    slug: 'event-encoding'
    domain: 'middleware-and-transport'
    description: 'Encode and decode AG-UI events for transport using SSE text format or binary protobuf format'
    type: core
    packages:
      - '@ag-ui/encoder'
      - '@ag-ui/proto'
    covers:
      - 'EventEncoder class'
      - 'Accept header negotiation'
      - 'SSE text encoding'
      - 'Protobuf binary encoding'
      - 'Content-Type handling'
      - 'SSE is the recommended default transport for most use cases'
    tasks:
      - 'Set up event encoding for a server endpoint'
      - 'Handle Accept header for content negotiation'
      - 'Use binary encoding for bandwidth efficiency (advanced)'
    failure_modes:
      - mistake: 'Wrong Accept header causing wrong encoding'
        mechanism: 'EventEncoder reads the Accept header to determine encoding format. Passing the wrong Accept value or omitting it causes mismatched encoding between server and client.'
        wrong_pattern: |
          const encoder = EventEncoder();  // Missing accept header
        correct_pattern: |
          const encoder = EventEncoder(accept=accept_header);  // From request
        source: 'docs/quickstart/server.mdx'
        priority: HIGH
        status: active

      - mistake: 'Missing Content-Type in response'
        mechanism: 'The server must set the Content-Type header to match the encoder output. Use encoder.get_content_type() to get the correct value. Missing it causes client decode failures.'
        source: 'docs/quickstart/server.mdx'
        priority: HIGH
        status: active

      - mistake: 'Encoding events without proper event type field'
        mechanism: 'Every event must have a type field matching an EventType enum value. The encoder serializes based on this discriminator. Missing or invalid type causes encoding errors.'
        source: 'sdks/typescript/packages/core/src/events.ts'
        priority: HIGH
        status: active
    compositions: []

  - name: 'Generative UI'
    slug: 'generative-ui'
    domain: 'advanced-features'
    description: 'Integrate generative UI specifications (A2UI, Open-JSON-UI, MCP-UI/MCP Apps) with AG-UI as the bidirectional transport'
    type: composition
    packages:
      - '@ag-ui/core'
    covers:
      - 'A2UI spec (Google)'
      - 'Open-JSON-UI spec (OpenAI)'
      - 'MCP-UI / MCP Apps spec (Microsoft + Shopify)'
      - 'AG-UI as transport layer'
      - 'Custom generative UI via CUSTOM events'
    tasks:
      - 'Understand AG-UI role vs generative UI specs'
      - 'Transport generative UI payloads through AG-UI events'
      - 'Use CUSTOM events for custom UI components'
    failure_modes:
      - mistake: 'Confusing AG-UI with a generative UI spec'
        mechanism: 'AG-UI is a user interaction protocol (transport), not a generative UI specification. It carries UI payloads from specs like A2UI or MCP-UI but does not define the UI format itself.'
        source: 'docs/concepts/generative-ui-specs.mdx'
        priority: HIGH
        status: active

      - mistake: 'Large UI descriptions reducing agent performance'
        mechanism: 'Injecting large generative UI schema descriptions into agent context consumes context window and degrades agent reasoning quality.'
        source: 'docs/concepts/generative-ui-specs.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Using tool calls for generative UI instead of proper specs'
        mechanism: 'While tool calls can trigger UI, dedicated generative UI specs (A2UI, MCP-UI) provide structured, streaming-friendly UI definitions. Overloading tool calls for complex UI is fragile.'
        source: 'docs/concepts/generative-ui-specs.mdx'
        priority: MEDIUM
        status: active
    compositions: []

tensions:
  - name: 'Simplicity vs protocol completeness'
    skills: ['implement-abstract-agent', 'run-lifecycle']
    description: 'Simple agent implementations want to emit minimal events, but the protocol requires strict lifecycle boundaries (RUN_STARTED/FINISHED) and event ordering.'
    implication: 'An agent optimizing for simplicity may skip RUN_STARTED or forget TEXT_MESSAGE_END, causing verifier errors. Agents must always emit the full lifecycle even for trivial responses.'

  - name: 'Chunk convenience vs explicit control'
    skills: ['text-message-events', 'tool-calling-events']
    description: 'CHUNK events simplify streaming but auto-manage lifecycle (auto-closing messages when switching IDs). Explicit START/CONTENT/END gives full control but requires manual lifecycle management.'
    implication: 'An agent using CHUNKs may be surprised when messages auto-close. An agent using explicit events may forget END events. Mixing both patterns for the same entity causes double-initialization.'

  - name: 'Snapshot bandwidth vs delta precision'
    skills: ['state-synchronization', 'serialization']
    description: 'STATE_SNAPSHOT is simple but sends full state on every update. STATE_DELTA is efficient but requires correct ordering and valid JSON Pointer paths.'
    implication: 'An agent defaulting to snapshots wastes bandwidth on large state. An agent defaulting to deltas risks corrupted state if patches are applied out of order or to wrong base.'

  - name: 'Middleware filtering vs upstream execution'
    skills: ['middleware', 'tool-calling-events']
    description: 'FilterToolCallsMiddleware filters events from the stream but cannot prevent the upstream LLM from attempting the tool call.'
    implication: 'An agent relying on middleware to block tool calls will still have the LLM execute them server-side. True blocking requires removing tools from RunAgentInput.tools before the run.'

