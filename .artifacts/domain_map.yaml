skills:
  - name: 'Implement AbstractAgent'
    slug: 'implement-abstract-agent'
    domain: 'implementing-agents'
    description: 'Implement the AbstractAgent interface for a new framework, translating framework-specific events to AG-UI protocol events'
    type: core
    packages:
      - '@ag-ui/core'
      - '@ag-ui/client'
    covers:
      - 'AbstractAgent base class'
      - 'run(input: RunAgentInput) method'
      - 'Observable<BaseEvent> return type'
      - 'RxJS Observable creation'
      - 'Event emission via subscriber.next()'
      - 'Event ordering requirements'
      - 'RunAgentInput structure'
      - 'Message format conversion'
    tasks:
      - 'Create a new AbstractAgent subclass for a framework'
      - 'Emit events in correct lifecycle order'
      - 'Convert framework messages to AG-UI message format'
      - 'Handle streaming responses from LLM providers'
      - 'Wire up memory/state persistence in agent'
    failure_modes:
      - mistake: 'Emitting events before RUN_STARTED'
        mechanism: 'The event verifier enforces that the first event must be RUN_STARTED. Any event emitted before it throws an error.'
        wrong_pattern: |
          run(input: RunAgentInput): Observable<BaseEvent> {
            return new Observable((subscriber) => {
              subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "1" });
              subscriber.next({ type: EventType.RUN_STARTED, threadId: input.threadId, runId: input.runId });
            });
          }
        correct_pattern: |
          run(input: RunAgentInput): Observable<BaseEvent> {
            return new Observable((subscriber) => {
              subscriber.next({ type: EventType.RUN_STARTED, threadId: input.threadId, runId: input.runId });
              subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "1" });
            });
          }
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: CRITICAL
        status: active

      - mistake: 'Not calling observer.complete() after RUN_FINISHED'
        mechanism: 'The Observable stays open indefinitely, causing memory leaks and the runAgent() promise never resolves.'
        wrong_pattern: |
          subscriber.next({ type: EventType.RUN_FINISHED, threadId, runId });
          // Missing: subscriber.complete()
        correct_pattern: |
          subscriber.next({ type: EventType.RUN_FINISHED, threadId, runId });
          subscriber.complete();
        source: 'integrations/mastra/typescript/src/mastra.ts'
        priority: CRITICAL
        status: active

      - mistake: 'Returning a plain value instead of Observable'
        mechanism: 'run() must return an Observable<BaseEvent>, not a Promise or array. The middleware chain and subscriber system depend on the Observable interface.'
        wrong_pattern: |
          async run(input: RunAgentInput): Promise<BaseEvent[]> {
            return [runStarted, textMessage, runFinished];
          }
        correct_pattern: |
          run(input: RunAgentInput): Observable<BaseEvent> {
            return new Observable<BaseEvent>((subscriber) => {
              subscriber.next(runStarted);
              subscriber.next(textMessage);
              subscriber.next(runFinished);
              subscriber.complete();
            });
          }
        source: 'docs/concepts/agents.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Emitting RUN_FINISHED with active messages or tool calls'
        mechanism: 'The verifier checks that all TEXT_MESSAGE and TOOL_CALL streams are closed before RUN_FINISHED. Throws error listing active IDs.'
        wrong_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "1" });
          subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "1", delta: "Hello" });
          // Missing TEXT_MESSAGE_END
          subscriber.next({ type: EventType.RUN_FINISHED, threadId, runId });
        correct_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "1" });
          subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "1", delta: "Hello" });
          subscriber.next({ type: EventType.TEXT_MESSAGE_END, messageId: "1" });
          subscriber.next({ type: EventType.RUN_FINISHED, threadId, runId });
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: HIGH
        status: active

      - mistake: 'Not handling async errors inside Observable'
        mechanism: 'Unhandled promise rejections inside the Observable constructor cause silent failures. Must call subscriber.error() in catch blocks.'
        wrong_pattern: |
          return new Observable((subscriber) => {
            const run = async () => {
              const response = await llm.stream(messages);
              // If this throws, the error is lost
            };
            run();
          });
        correct_pattern: |
          return new Observable((subscriber) => {
            const run = async () => {
              try {
                const response = await llm.stream(messages);
              } catch (error) {
                subscriber.error(error);
              }
            };
            run();
          });
        source: 'integrations/mastra/typescript/src/mastra.ts'
        priority: HIGH
        status: active
      - mistake: 'Over-implementing all AbstractAgent methods without user context'
        mechanism: 'AI agents tend to implement every possible method (getCapabilities, connect, etc.) with placeholder values instead of asking what the user actually needs. This produces bloated, incorrect implementations where capabilities are declared that the agent does not actually support.'
        source: 'maintainer interview'
        priority: HIGH
        status: active
    compositions:
      - library: 'RxJS'
        skill: null

  - name: 'HTTP Agent Setup'
    slug: 'http-agent-setup'
    domain: 'implementing-agents'
    description: 'Use the HttpAgent abstraction to connect to a remote agent endpoint and handle HTTP-based event streaming via SSE'
    type: core
    packages:
      - '@ag-ui/client'
    covers:
      - 'HttpAgent class'
      - 'HttpAgentConfig (url, headers)'
      - 'SSE event stream parsing'
      - 'AbortController for cancellation'
      - 'requestInit() customization'
      - 'Agent subscriber callbacks'
    tasks:
      - 'Connect to a remote AG-UI agent endpoint'
      - 'Configure authentication headers'
      - 'Handle SSE event streaming'
      - 'Cancel in-flight requests with abortRun()'
      - 'Subscribe to agent events with callbacks'
    failure_modes:
      - mistake: 'Missing Accept header for SSE'
        mechanism: 'HttpAgent sets Accept: text/event-stream by default. If overriding headers, omitting Accept causes the server to respond with wrong content type.'
        wrong_pattern: |
          const agent = new HttpAgent({
            url: "https://agent.example.com",
            headers: { "Authorization": "Bearer token" }  // Accept header preserved
          });
        correct_pattern: |
          const agent = new HttpAgent({
            url: "https://agent.example.com",
            headers: { "Authorization": "Bearer token" }
          });
          // HttpAgent handles Accept header automatically - don't override it
        source: 'sdks/typescript/packages/client/src/agent/http.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Calling abortRun() twice'
        mechanism: 'Each runAgent() call creates a new AbortController, but calling abortRun() outside of an active run may cause unexpected behavior.'
        source: 'sdks/typescript/packages/client/src/agent/http.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Not providing threadId and runId'
        mechanism: 'HttpAgent sends RunAgentInput as JSON body. The server expects threadId and runId to track conversation state. AbstractAgent auto-generates these if not provided.'
        source: 'docs/sdk/js/client/http-agent.mdx'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Text Message Events'
    slug: 'text-message-events'
    domain: 'event-streaming'
    description: 'Emit and handle text message events for streaming chat, using either the explicit START/CONTENT/END pattern or the convenience CHUNK event'
    type: core
    packages:
      - '@ag-ui/core'
    covers:
      - 'TEXT_MESSAGE_START event'
      - 'TEXT_MESSAGE_CONTENT event'
      - 'TEXT_MESSAGE_END event'
      - 'TEXT_MESSAGE_CHUNK convenience event'
      - 'messageId consistency'
      - 'Message role types'
    tasks:
      - 'Stream text responses from an agent'
      - 'Handle text message events in a client'
      - 'Use chunk events for simpler streaming'
    failure_modes:
      - mistake: 'Empty delta in TEXT_MESSAGE_CONTENT'
        mechanism: 'The Zod schema enforces that TextMessageContent.delta must be a non-empty string. Empty string causes validation failure.'
        wrong_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "1", delta: "" });
        correct_pattern: |
          if (text.length > 0) {
            subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "1", delta: text });
          }
        source: 'sdks/typescript/packages/core/src/events.ts'
        priority: HIGH
        status: active

      - mistake: 'Missing messageId in first TEXT_MESSAGE_CHUNK'
        mechanism: 'The chunk transformer throws "First TEXT_MESSAGE_CHUNK must have a messageId" if the first chunk for a new message omits messageId.'
        wrong_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_CHUNK, delta: "Hello" });
        correct_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_CHUNK, messageId: "msg-1", delta: "Hello" });
        source: 'sdks/typescript/packages/client/src/chunks/transform.ts'
        priority: CRITICAL
        status: active

      - mistake: 'Mismatched messageId between START and CONTENT'
        mechanism: 'The verifier tracks active messages by messageId. Content events with a different messageId than the active START event will fail verification.'
        wrong_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "msg-1" });
          subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "msg-2", delta: "Hello" });
        correct_pattern: |
          subscriber.next({ type: EventType.TEXT_MESSAGE_START, messageId: "msg-1" });
          subscriber.next({ type: EventType.TEXT_MESSAGE_CONTENT, messageId: "msg-1", delta: "Hello" });
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: HIGH
        status: active

      - mistake: 'Mixing CHUNK events with explicit START/CONTENT/END'
        mechanism: 'Chunk events are auto-transformed to START/CONTENT/END sequences. Mixing both patterns for the same message causes double-initialization or orphaned events.'
        source: 'docs/concepts/events.mdx'
        priority: HIGH
        status: active
    compositions: []

