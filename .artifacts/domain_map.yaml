    failure_modes:
      - mistake: 'Tool arguments as parsed object instead of JSON string'
        mechanism: 'ToolCall.function.arguments must be a JSON string, not a parsed object. TOOL_CALL_ARGS delta is concatenated as string fragments that form valid JSON.'
        wrong_pattern: |
          subscriber.next({
            type: EventType.TOOL_CALL_ARGS,
            toolCallId: "tc-1",
            delta: { city: "London" }  // Wrong: object instead of string
          });
        correct_pattern: |
          subscriber.next({
            type: EventType.TOOL_CALL_ARGS,
            toolCallId: "tc-1",
            delta: '{"city": "London"}'  // Correct: JSON string
          });
        source: 'docs/concepts/tools.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Missing toolCallName in first TOOL_CALL_CHUNK'
        mechanism: 'The chunk transformer throws "First TOOL_CALL_CHUNK must have a toolCallName" if the first chunk omits the tool name.'
        wrong_pattern: |
          subscriber.next({ type: EventType.TOOL_CALL_CHUNK, toolCallId: "tc-1", delta: '{"x":1}' });
        correct_pattern: |
          subscriber.next({ type: EventType.TOOL_CALL_CHUNK, toolCallId: "tc-1", toolCallName: "getWeather", delta: '{"x":1}' });
        source: 'sdks/typescript/packages/client/src/chunks/transform.ts'
        priority: CRITICAL
        status: active

      - mistake: 'Starting same toolCallId twice'
        mechanism: 'The verifier throws "A tool call with ID ... is already in progress" if TOOL_CALL_START is emitted with an already-active toolCallId.'
        source: 'sdks/typescript/packages/client/src/verify/verify.ts'
        priority: HIGH
        status: active

      - mistake: 'OpenAI tool description exceeds 1024 chars'
        mechanism: 'OpenAI enforces a 1024 character limit for tool descriptions. Exceeding it causes silent truncation or API errors. Gemini and Anthropic have no such limit.'
        source: 'docs/concepts/tools.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'TOOL_CALL_RESULT without matching toolCallId'
        mechanism: 'The result event must reference a toolCallId from a prior TOOL_CALL_START. Orphaned results create broken message history.'
        source: 'docs/concepts/tools.mdx'
        priority: HIGH
        status: active
    compositions: []

