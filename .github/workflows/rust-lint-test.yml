name: test

on:
  push:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - ".github/workflows/rust.yml"
      - "tests/**"
      - "Cargo.toml"
      - ".cargo/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "sdks/community/rust/crates/**"
      - "sdks/community/rust/**/tests/**"
      - "sdks/community/rust/Cargo.toml"
      - "sdks/community/rust/.cargo/**"
      - ".github/workflows/rust-lint-test.yml"

defaults:
  run:
    working-directory: ./sdks/community/rust

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    name: Rust SDK Tests [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}

    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/community/rust -> target

      - name: Build
        run: cargo build --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check clippy
        run: cargo clippy -- -D warnings

      - name: Publish ag-ui-core dry-run
        run: cargo publish -p ag-ui-core --dry-run

      - name: Publish ag-ui-client dry-run
        # --no-verify skips rebuilding the packaged tarball, which is required
        # because ag-ui-client depends on ag-ui-core via version = "0.1.0" and
        # cargo's verification build ignores the workspace [patch.crates-io]
        # entry. The currently-published ag-ui-core 0.1.0 on crates.io is
        # stale (missing types that were added to the workspace since), so the
        # verify step fails. Packaging itself (what the dry-run is meant to
        # cover) still runs.
        run: cargo publish -p ag-ui-client --dry-run --no-verify

      - name: Run tests
        run: cargo test --verbose
