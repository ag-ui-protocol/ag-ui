name: Prerelease

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Release scope (from release.config.json)"
        required: true
        type: choice
        options:
          - a2a
          - a2a-middleware
          - a2ui-middleware
          - adk-middleware
          - ag2
          - agent-spec
          - agno
          - aws-strands
          - claude-agent-sdk
          - crewai
          - langchain
          - langgraph
          - langroid
          - llama-index
          - mastra
          - mcp-apps-middleware
          - pydantic-ai
          - py-sdk
          - spring-ai
          - ts-sdk
      suffix:
        description: "Version suffix (defaults to unix timestamp if empty)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run — show changes without publishing"
        required: false
        type: boolean
        default: false

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prerelease:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.8.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute prerelease version and bump
        id: bump
        env:
          SCOPE: ${{ github.event.inputs.scope }}
          SUFFIX: ${{ github.event.inputs.suffix }}
        run: |
          # Compute suffix — use unix timestamp if not provided
          if [ -z "$SUFFIX" ]; then
            SUFFIX=$(date +%s)
          fi

          # Bump as prerelease with canary tag and the suffix
          RESULT=$(npx tsx scripts/release/prepare-release.ts \
            --scope "$SCOPE" \
            --bump prerelease \
            --preid "canary.${SUFFIX}")

          echo "$RESULT" > /tmp/bump-result.json
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

          # Show what we're going to publish
          echo "## Prerelease Packages" >> $GITHUB_STEP_SUMMARY
          jq -r '.packages[] | "- **\(.name)**: \(.oldVersion) → \(.newVersion)"' /tmp/bump-result.json >> $GITHUB_STEP_SUMMARY

      - name: Build TypeScript packages
        run: pnpm run build

      - name: Test TypeScript packages
        run: pnpm run test

      - name: Publish TypeScript packages
        if: github.event.inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TS_PACKAGES=$(jq -c '[.packages[] | select(.ecosystem == "typescript")]' /tmp/bump-result.json)
          TS_COUNT=$(echo "$TS_PACKAGES" | jq 'length')

          if [ "$TS_COUNT" -gt 0 ]; then
            PROJECTS=$(echo "$TS_PACKAGES" | jq -r '[.[].name] | join(",")')
            echo "Publishing TypeScript canary: $PROJECTS"
            npx nx release publish --projects="$PROJECTS" --tag canary
          fi

      - name: Publish Python packages
        if: github.event.inputs.dry_run != 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          PY_PACKAGES=$(jq -c '[.packages[] | select(.ecosystem == "python")]' /tmp/bump-result.json)
          PY_COUNT=$(echo "$PY_PACKAGES" | jq 'length')

          if [ "$PY_COUNT" -gt 0 ]; then
            FAILED=0
            while read -r pkg; do
              FILE=$(echo "$pkg" | jq -r '.file')
              DIR=$(dirname "$FILE")
              BUILD_SYSTEM=$(echo "$pkg" | jq -r '.buildSystem // "uv"')

              echo "Publishing Python canary from $DIR"
              if ! bash scripts/release/publish-python-package.sh "$DIR" "$BUILD_SYSTEM"; then
                echo "ERROR: Failed to publish Python canary from $DIR" >&2
                FAILED=1
              fi
            done < <(echo "$PY_PACKAGES" | jq -c '.[]')
            if [ "$FAILED" -ne 0 ]; then
              echo "ERROR: One or more Python canary publishes failed" >&2
              exit 1
            fi
          fi

      - name: Dry-run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**DRY RUN** — no packages were published" >> $GITHUB_STEP_SUMMARY

      - name: Publish summary
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published canary versions to npm/PyPI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          jq -r '.packages[] | select(.ecosystem == "typescript") | "```\nnpm install \(.name)@canary\n```"' /tmp/bump-result.json >> $GITHUB_STEP_SUMMARY
          jq -r '.packages[] | select(.ecosystem == "python") | "```\npip install \(.name)==\(.newVersion)\n```"' /tmp/bump-result.json >> $GITHUB_STEP_SUMMARY
